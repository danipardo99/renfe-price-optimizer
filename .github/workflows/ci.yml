name: renfe-optimizer-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./renfe-price-optimizer

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar paquete en modo editable
        run: pip install -e .

      - name: Revisar estilo con Ruff
        run: ruff check .

      - name: Ejecutar tests
        run: pytest -v

      - name: Smoke test de entrenamiento
        run: python -m renfe_optimizer.train --config params.yaml --sample --max-rows 500
name: renfe-optimizer-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./renfe-price-optimizer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install project
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        run: uv run pytest -q --disable-warnings

      - name: Smoke import
        run: uv run python -c "from renfe_optimizer.features import load_and_build; print('smoke OK')"
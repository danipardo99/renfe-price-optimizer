data:
  raw_path: data/raw/renfe_full.csv
  processed_path: data/processed/train.parquet
  origin: MADRID
  destination: BARCELONA
features:
  ventanas_antelacion:
  - 90
  - 60
  - 30
  - 21
  - 14
  - 7
  - 3
  - 1
  categorical:
  - vehicle_type
  - vehicle_class
  - fare
  numerical:
  - duration
  - dias_anticipacion
  - hora_salida
  - dia_semana
  - mes
model:
  type: random_forest
  params:
    n_estimators: 50
    max_depth: 8
    random_state: 42
    n_jobs: -1
training:
  test_size: 0.2
  random_state: 42
  target: price
paths:
  model_out: models/renfe_model.pkl
  metrics_out: reports/metrics.json
